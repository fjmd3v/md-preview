name: Setup Gradle Wrapper

on:
  workflow_dispatch:
  pull_request:

jobs:
  setup-wrapper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        working-directory: ./mobile/android
        run: |
          # Use system Gradle to bootstrap the wrapper with a compatible version
          gradle wrapper --gradle-version 8.10 --distribution-type bin
          chmod +x gradlew

      - name: Verify Wrapper
        working-directory: ./mobile/android
        run: ls -la gradlew gradle/wrapper/

      - name: Commit and push Gradle Wrapper files
        working-directory: ./mobile/android
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: add Gradle Wrapper (version 8.10)"
            git push
            echo "✅ Gradle Wrapper committed and pushed."
          fi
