<style>

  --muted: #625f59;

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {

a { color: inherit; }

.lang-switch {

}

.hero {

}

}
.hero-inner {
  position: relative;
  width: min(1120px, calc(100% - 40px));

}
.eyebrow {

  align-items: center;
  min-height: 30px;
  padding: 0 12px;
  border: 1px solid rgba(255,255,255,.28);
  border-radius: 999px;
  color: rgba(255,255,255,.84);
  font-size: 13px;
  background: rgba(255,255,255,.08);
}
h1 {

  font-size: 64px;
  line-height: 1.02;

}
.hero-copy {

  margin: 0 0 30px;
  color: rgba(255,255,255,.82);

}
.actions {

}
.button {

  justify-content: center;
  padding: 0 20px;

.hero-proof {
  margin-top: 44px;
  display: grid;
  grid-template-columns: repeat(4, minmax(120px, 1fr));
  gap: 1px;
  max-width: 760px;
  border: 1px solid rgba(255,255,255,.18);

}
.proof-item {

  font-size: 22px;
  font-weight: 760;
}
.proof-label {
  display: block;
  color: rgba(255,255,255,.70);
  font-size: 13px;
}

.section {

.section-head {

  margin-bottom: 30px;

  gap: 38px;
  align-items: center;
}

.feature-grid {

.feature:nth-child(3n) { background: #f5f8fc; }
.feature h3 {
  margin: 0 0 8px;

.feature p {

}

.compare-wrap {
  overflow-x: auto;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: white;
}
.compare {
  width: 100%;
  border-collapse: collapse;
  min-width: 620px;
}
.compare th,
.compare td {
  padding: 15px 18px;
  text-align: left;
  border-bottom: 1px solid var(--line);
}
.compare tr:last-child td { border-bottom: 0; }
.compare th {
  font-size: 13px;
  color: var(--muted);
  background: #faf7f0;
}
.compare td:nth-child(2) {
  color: var(--green);
  font-weight: 750;
}

.download-band {
  background: var(--code);
  color: white;
}
.download-grid {
  width: min(1120px, calc(100% - 40px));

  padding: 68px 0;

  grid-template-columns: .85fr 1.15fr;
  gap: 36px;
  align-items: start;
}
.download-grid .lead { color: rgba(255,255,255,.72); }
.downloads {

  gap: 10px;
}
.download-row {

  grid-template-columns: 110px 1fr;
  gap: 18px;
  padding: 17px 18px;
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 8px;
  background: rgba(255,255,255,.06);
}
.download-row strong { color: #fff; }
.download-row span { color: rgba(255,255,255,.70); }
.download-actions { margin-top: 22px; }

.tech {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
}
.tech span {
  padding: 18px 12px;
  text-align: center;
  background: #fffaf2;
  border-right: 1px solid var(--line);
  font-weight: 700;
}
.tech span:last-child { border-right: 0; }

footer {
  border-top: 1px solid var(--line);
  padding: 34px 20px;
  color: var(--muted);
  text-align: center;
  font-size: 14px;
}
footer a { color: var(--green); font-weight: 650; }

@media (max-width: 900px) {
  h1 { font-size: 48px; }
  .hero-proof { grid-template-columns: repeat(2, 1fr); }

  .tech span:nth-child(3) { border-right: 0; }

  .feature-grid { grid-template-columns: 1fr; }
  .download-grid { width: min(100% - 28px, 1120px); padding: 52px 0; }
  .download-row { grid-template-columns: 1fr; gap: 4px; }
  .button { width: 100%; }
  .tech { grid-template-columns: repeat(2, 1fr); }
  .tech span { border-bottom: 1px solid var(--line); }
  .tech span:nth-child(2n) { border-right: 0; }
  .tech span:nth-last-child(-n+2) { border-bottom: 0; }
}

<script>
(function() {
  var lang = (navigator.language || '').toLowerCase().startsWith('zh') ? 'zh' : 'en';

  function apply(next) {
    lang = next;
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-' + lang + ']').forEach(function(el) {
      el.innerHTML = el.getAttribute('data-' + lang);
    });
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
  }

  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.addEventListener('click', function(event) {
      event.preventDefault();
      apply(btn.dataset.lang);
    });
  });

  apply(lang);
})();
</script>
